server {
    listen 80;
    server_name mcp.dhcp.ee _;

    # CRITICAL: Disable buffering for SSE (Server-Sent Events)
    proxy_buffering off;
    chunked_transfer_encoding off;
    proxy_cache off;
    
    # Required headers for SSE and Proxying
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Increase timeouts for long-running stream connections
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # 0. Health Monitor Dashboard (Root)
    location / {
        proxy_pass http://127.0.0.1:8100/;
    }

    # 1. FileSystem (Node 2 Local)
    location /filesystem/ {
        proxy_pass http://127.0.0.1:8101/;
    }

    # 2. Brave Search
    location /brave/ {
        proxy_pass http://127.0.0.1:8102/;
    }

    # 3. Calculator
    location /calculator/ {
        proxy_pass http://127.0.0.1:8103/;
    }

    # 4. Memory
    location /memory/ {
        proxy_pass http://127.0.0.1:8104/;
    }

    # 5. GitHub
    location /github/ {
        proxy_pass http://127.0.0.1:8105/;
    }

    # 6. SQLite
    location /sqlite/ {
        proxy_pass http://127.0.0.1:8106/;
    }

    # 7. Browser
    location /browser/ {
        proxy_pass http://127.0.0.1:8107/;
    }

    # 8. Shell Sandbox
    location /shell/ {
        proxy_pass http://127.0.0.1:8108/;
    }
}
